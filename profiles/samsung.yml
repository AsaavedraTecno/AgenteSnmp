# profiles/samsung.yml
# ─────────────────────────────────────────────────────────────────────────────
# Perfil Samsung — Samsung Electronics (absorbido por HP en 2017)
# Enterprise OID prefix: 1.3.6.1.4.1.236
# ─────────────────────────────────────────────────────────────────────────────
# NOTA: Los equipos Samsung modernos (serie SL-) pueden responder también
# al prefijo HP (1.3.6.1.4.1.11) si tienen firmware actualizado post-adquisición.
# Este perfil cubre los dispositivos con firmware Samsung nativo.

profile_id: samsung
brand: Samsung
description: "Samsung ML / CLX / SL series — Samsung Enterprise MIB + RFC 3805"

match_oid_patterns:
  - "1.3.6.1.4.1.236."

oids:

  # ── Identificación ───────────────────────────────────────────────────────
  # Samsung expone modelo y serial en su MIB privada (OID 236.11.5.1.1.1).
  identification:
    model:
      - "1.3.6.1.4.1.236.11.5.11.53.31.1.4.0"  # Samsung model name
      - "1.3.6.1.4.1.236.11.5.1.1.1.4.0"       # General model name
      - "1.3.6.1.4.1.236.11.5.1.1.1.1.0"       # El genérico Samsung
    serial_number: 
      - "1.3.6.1.4.1.236.11.5.1.1.1.4.0"      # Serial samsung nuevas gen|
      - "1.3.6.1.4.1.236.11.5.1.1.1.6.0"      # El genérico Samsung
      - "1.3.6.1.2.1.43.5.1.1.17.1"           # RFC Universal
    hostname:      "1.3.6.1.2.1.1.5.0"                # sysName
    location:      "1.3.6.1.2.1.1.6.0"                # sysLocation

  # ── Contadores de páginas ────────────────────────────────────────────────
  # Samsung MIB privada expone dos niveles de detalle:
  #   • 236.11.5.1.1.3  — totales básicos (compatibilidad amplia)
  #   • 236.11.5.11.53.11.2.1.7.1  — matriz granular por función/modo (firmware ≥ SL-series)
  #
  # El colector usa first-valid-wins para cada campo (OIDList).
  # Los contadores granulares (print_simplex, copy_simplex, etc.) permiten derivar
  # print_pages, copy_pages, simplex_pages, duplex_pages y scan_pages directamente
  # desde SNMP sin necesidad de web scraping.
  counters:
    # total_pages: primero el OID de la MIB ampliada (suma de función×modo = billing);
    # fallback al OID clásico 236.11.5.1.1.3.27.0 si el primero no responde.
    total_pages:
      - "1.3.6.1.4.1.236.11.5.11.53.11.1.2.0"          # Billing total MIB ampliada (confirmado)
      - "1.3.6.1.4.1.236.11.5.1.1.3.27.0"              # Total clásico Samsung (confirmado: 14688)

    mono_pages:    "1.3.6.1.4.1.236.11.5.1.1.3.29.0"   # Mono total (0 en monocromáticas M332x/M402x)

    # Contadores granulares por función y modo (MIB ampliada 236.11.5.11.53.11.2.1.7.1.*)
    # collectCountersFromYAML los deriva automáticamente en:
    #   print_pages  = print_simplex + print_duplex
    #   copy_pages   = copy_simplex  + copy_duplex
    #   simplex_pages = print_simplex + copy_simplex
    #   duplex_pages  = print_duplex  + copy_duplex
    #   scan_pages   = scan_mono + scan_color
    print_simplex: "1.3.6.1.4.1.236.11.5.11.53.11.2.1.7.1.17"  # Impresiones simplex
    copy_simplex:  "1.3.6.1.4.1.236.11.5.11.53.11.2.1.7.1.18"  # Copias simplex
    print_duplex:  "1.3.6.1.4.1.236.11.5.11.53.11.2.1.7.1.21"  # Impresiones dúplex
    copy_duplex:   "1.3.6.1.4.1.236.11.5.11.53.11.2.1.7.1.22"  # Copias dúplex
    scan_color:    "1.3.6.1.4.1.236.11.5.11.53.11.2.1.7.1.34"  # Escaneos color
    scan_mono:     "1.3.6.1.4.1.236.11.5.11.53.11.2.1.7.1.35"  # Escaneos mono

    # Páginas por bandeja de origen
    tray1_pages:   "1.3.6.1.4.1.236.11.5.1.1.3.33.0"   # Bandeja 1 (confirmado: 12283)
    mp_pages:      "1.3.6.1.4.1.236.11.5.1.1.3.31.0"   # MP Tray (confirmado: 2405)

  # ── Estado ───────────────────────────────────────────────────────────────
  status:
    device_status:  "1.3.6.1.2.1.25.3.2.1.5.1"    # hrDeviceStatus
    printer_status: "1.3.6.1.2.1.43.13.4.1.7.1.1"  # prtAlertSeverityLevel
    error_state:    "1.3.6.1.2.1.43.8.2.1.13.1.1"  # prtInputStatus

  # ── Suministros ──────────────────────────────────────────────────────────
  # Samsung implementa RFC 3805 para suministros. Los cartuchos CRUM
  # (Customer Replaceable Unit Monitor) exponen también datos de serial
  # en la descripción; classifySupply los extrae correctamente.
  supplies:
    base_desc_oid:  "1.3.6.1.2.1.43.11.1.1.6"   # prtMarkerSuppliesDescription
    base_level_oid: "1.3.6.1.2.1.43.11.1.1.9"   # prtMarkerSuppliesLevel
    base_max_oid:   "1.3.6.1.2.1.43.11.1.1.8"   # prtMarkerSuppliesMaxCapacity

  # ── Red ──────────────────────────────────────────────────────────────────
  network:
    mac_address: "1.3.6.1.2.1.2.2.1.6.1"           # ifPhysAddress iface 1 (LAN)
    ip_address:  "1.3.6.1.2.1.4.20.1.1.1"           # ipAdEntAddr
